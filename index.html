                                                )}
                                                {idx < panes.length - 1 && (
                                                    <button
                                                        className="pane-control-btn"
                                                        onClick={() => swapPanes(idx, idx + 1)}
                                                        title="Move right"
                                                    >
                                                        <i className="fas fa-arrow-right"></i>
                                                    </button>
                                                )}
                                                <button
                                                    className="pane-control-btn close"
                                                    onClick={() => closePane(pane)}
                                                    title="Close pane"
                                                >
                                                    <i className="fas fa-times"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div className="pane-content">
                                            {renderPaneContent(pane)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="content-area">
                                {renderPaneContent(activeTab)}
                            </div>
                        )}

                    {modalTodoId && (
                        <div className="modal-overlay" onClick={() => setModalTodoId(null)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">Add to Calendar</div>
                                <div className="modal-field">
                                    <label className="modal-label">Date</label>
                                    <input
                                        type="date"
                                        className="modal-input"
                                        value={modalDate}
                                        onChange={(e) => setModalDate(e.target.value)}
                                    />
                                </div>
                                <div className="modal-field">
                                    <label className="modal-label">Time (optional)</label>
                                    <div className="modal-time-inputs">
                                        <input
                                            type="number"
                                            className="modal-input"
                                            placeholder="HH"
                                            min="0"
                                            max="23"
                                            value={modalHour}
                                            onChange={(e) => setModalHour(e.target.value)}
                                        />
                                        <input
                                            type="number"
                                            className="modal-input"
                                            placeholder="MM"
                                            min="0"
                                            max="59"
                                            value={modalMinute}
                                            onChange={(e) => setModalMinute(e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="modal-actions">
                                    <button className="modal-btn save" onClick={saveToCalendar}>
                                        Save
                                    </button>
                                    <button className="modal-btn cancel" onClick={() => setModalTodoId(null)}>
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {deleteConfirmTodoId && (
                        <div className="modal-overlay" onClick={() => setDeleteConfirmTodoId(null)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">Delete Todo?</div>
                                <div style={{ padding: '20px', textAlign: 'center', color: '#e4e6eb' }}>
                                    Are you sure you want to delete this todo? This cannot be undone.
                                </div>
                                <div className="modal-actions">
                                    <button className="modal-btn delete" onClick={() => {
                                        deleteTodo(deleteConfirmTodoId);
                                        setDeleteConfirmTodoId(null);
                                    }}>
                                        Delete
                                    </button>
                                    <button className="modal-btn cancel" onClick={() => setDeleteConfirmTodoId(null)}>
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TodoApp />, document.getElementById('root'));
    </script>
</body>
</html>
